<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Popup Example</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f0f0f0;
    }

    /* Example upload button */
    .upload-btn {
      margin: 100px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background-color: #000;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
    }

    .upload-btn:hover {
      transform: scale(1.03);
    }

    /* Dark overlay */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.35);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    /* Small popup box */
    .modal-content {
      width: 360px;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      position: relative;
      text-align: center;
    }

    .modal-content h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .modal-content p {
      margin: 0 0 18px;
      color: #666;
      font-size: 14px;
      line-height: 1.4;
    }

    .file-input {
      margin: 12px 0 18px;
      width: 100%;
    }

    .file-name {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
      word-break: break-word;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }

    .modal-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .cancel-btn {
      background-color: #dddddd;
      color: #111;
    }

    .confirm-btn {
      background-color: #000;
      color: #fff;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- Main upload button -->
  <button class="upload-btn" id="openUploadPopup">UPLOAD</button>

  <!-- Popup modal -->
  <div class="modal" id="uploadModal">
    <div class="modal-content">
      <button class="close-btn" id="closeUploadPopup">&times;</button>

      <h2>Upload File</h2>
      <p>Select an image or file from your local drive.</p>

      <input type="file" id="fileInput" class="file-input" />
      <div class="file-name" id="fileName">No file selected</div>

      <div class="modal-actions">
        <button class="modal-btn cancel-btn" id="cancelUpload">Cancel</button>
        <button class="modal-btn confirm-btn" id="confirmUpload">Upload</button>
      </div>
    </div>
  </div>

  <script>
    const openUploadPopup = document.getElementById("openUploadPopup");
    const closeUploadPopup = document.getElementById("closeUploadPopup");
    const cancelUpload = document.getElementById("cancelUpload");
    const confirmUpload = document.getElementById("confirmUpload");
    const uploadModal = document.getElementById("uploadModal");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");

    // Open popup
    openUploadPopup.addEventListener("click", () => {
      uploadModal.style.display = "flex";
    });

    // Close popup
    function closeModal() {
      uploadModal.style.display = "none";
    }

    closeUploadPopup.addEventListener("click", closeModal);
    cancelUpload.addEventListener("click", closeModal);

    // Close when clicking outside popup
    uploadModal.addEventListener("click", (e) => {
      if (e.target === uploadModal) {
        closeModal();
      }
    });

    // Show selected file name
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        fileName.textContent = "Selected: " + fileInput.files[0].name;
      } else {
        fileName.textContent = "No file selected";
      }
    });

    // Example upload action
    confirmUpload.addEventListener("click", () => {
      if (fileInput.files.length === 0) {
        alert("Please select a file first.");
        return;
      }

      const selectedFile = fileInput.files[0];
      alert("File ready to upload: " + selectedFile.name);

      // Later, this is where you connect to backend upload logic
      // Example:
      // const formData = new FormData();
      // formData.append("file", selectedFile);
      // fetch("/upload", {
      //   method: "POST",
      //   body: formData
      // });

      closeModal();
    });
  </script>

</body>
</html>
